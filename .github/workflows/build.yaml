---
name: Build

on:
  workflow_dispatch:
    inputs:
      app:
        description: App to build (all apps when empty)
        required: false
        default: ""
  pull_request:
    paths:
      - apps/**
  push:
    branches:
      - main
    paths:
      - apps/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.matrix.outputs.build }}
      merge: ${{ steps.matrix.outputs.merge }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Generate matrix
        id: matrix
        env:
          INPUT_APP: ${{ inputs.app }}
        run: |
          set -euo pipefail

          case "${GITHUB_EVENT_NAME}" in
            workflow_dispatch)
              if [[ -n "${INPUT_APP}" ]]; then
                apps="${INPUT_APP}"
              else
                apps="$(ls apps)"
              fi
              ;;
            pull_request)
              apps="$(git diff --name-only "origin/${GITHUB_BASE_REF}"...HEAD -- apps | cut -d/ -f2 | sort -u)"
              ;;
            *)
              if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
                apps="$(git diff --name-only HEAD^ HEAD -- apps | cut -d/ -f2 | sort -u)"
              else
                apps="$(ls apps)"
              fi
              ;;
          esac

          build="[]"
          merge="[]"
          for app in ${apps}; do
            metadata="apps/${app}/metadata.yaml"
            [[ -f "${metadata}" ]] || continue
            version="$(yq '.version' "${metadata}")"
            test_cmd="$(yq '.test // ""' "${metadata}")"
            merge="$(jq -c --arg app "${app}" --arg version "${version}" \
              '. + [{app: $app, version: $version}]' <<<"${merge}")"
            while read -r platform; do
              case "${platform}" in
                linux/amd64) runner="ubuntu-latest" ;;
                linux/arm64) runner="ubuntu-24.04-arm" ;;
                *) echo "unsupported platform: ${platform}" >&2; exit 1 ;;
              esac
              build="$(jq -c \
                --arg app "${app}" --arg version "${version}" --arg platform "${platform}" \
                --arg slug "${platform//\//-}" --arg runner "${runner}" --arg test "${test_cmd}" \
                '. + [{app: $app, version: $version, platform: $platform, slug: $slug, runner: $runner, test: $test}]' \
                <<<"${build}")"
            done < <(yq '.platforms[]' "${metadata}")
          done

          echo "build=${build}" >>"${GITHUB_OUTPUT}"
          echo "merge=${merge}" >>"${GITHUB_OUTPUT}"

  build:
    name: build (${{ matrix.app }}, ${{ matrix.platform }})
    needs: prepare
    if: ${{ needs.prepare.outputs.build != '[]' }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.build) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Lint Dockerfile
        if: ${{ matrix.platform == 'linux/amd64' }}
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: apps/${{ matrix.app }}/Dockerfile

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: apps/${{ matrix.app }}
          platforms: ${{ matrix.platform }}
          load: true
          tags: local/${{ matrix.app }}:test
          cache-from: type=gha,scope=${{ matrix.app }}-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-${{ matrix.slug }}

      - name: Test
        if: ${{ github.event_name == 'pull_request' && matrix.test != '' }}
        env:
          TEST_CMD: ${{ matrix.test }}
        run: docker run --rm local/${{ matrix.app }}:test sh -c "${TEST_CMD}"

      - name: Build and push by digest
        id: build
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: apps/${{ matrix.app }}
          platforms: ${{ matrix.platform }}
          labels: |
            org.opencontainers.image.title=${{ matrix.app }}
            org.opencontainers.image.version=${{ matrix.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ matrix.app }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.app }}-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-${{ matrix.slug }}

      - name: Export digest
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.app }}-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge (${{ matrix.app }})
    needs:
      - prepare
      - build
    if: ${{ github.event_name != 'pull_request' && needs.prepare.outputs.merge != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.merge) }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-${{ matrix.app }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        id: push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          image="ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}"
          version="${{ matrix.version }}"
          major="${version%%.*}"
          minor="${version%.*}"
          docker buildx imagetools create \
            --tag "${image}:${version}" \
            --tag "${image}:${minor}" \
            --tag "${image}:${major}" \
            --tag "${image}:latest" \
            $(printf -- "${image}@sha256:%s " *)
          digest="$(docker buildx imagetools inspect "${image}:${version}" --format '{{json .Manifest}}' | jq -r '.digest')"
          echo "digest=${digest}" >>"${GITHUB_OUTPUT}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
